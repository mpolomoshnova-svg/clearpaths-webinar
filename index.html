<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClearPaths — UC admissions, from someone who read the applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ClearPaths — Forest + Cream + Terracotta */
:root {
  --cp-ink: #14342B;
  --cp-cream: #FAF5EC;
  --cp-terracotta: #C2553A;
  --cp-terracotta-deep: #A84530;
  --cp-text-primary: #1A1A1A;
  --cp-text-body: #2E2E2E;
  --cp-text-muted: #6B6B6B;
  --cp-text-oncream: #1A1A1A;
  --cp-text-onink: #FAF5EC;
  --cp-sand: #E8DFD3;
  --cp-sage: #9DB5A3;
  --cp-rose-dust: #E5B5A0;
  --cp-success: #3F8A5A;
  --cp-warning: #D99A4D;
  --cp-error: #B34B3A;
  --cp-border: #E2DACE;
  --cp-border-hard: #C9BFAD;
  --cp-surface-2: #F3EBDC;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 40px;
  --space-2xl: 64px;
  --space-3xl: 96px;
  --space-4xl: 128px;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 24px;
  --radius-pill: 999px;
  --shadow-1: 0 1px 2px rgba(20, 52, 43, 0.06);
  --shadow-2: 0 4px 12px rgba(20, 52, 43, 0.08);
  --shadow-3: 0 12px 32px rgba(20, 52, 43, 0.10);
  --motion-fast: 150ms ease-out;
  --motion-base: 250ms ease-out;
  --motion-slow: 500ms ease-out;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--cp-cream);
  color: var(--cp-text-body);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 17px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

.t-hero {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: clamp(40px, 5.2vw, 64px);
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--cp-text-primary);
  text-wrap: balance;
}
.t-h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: clamp(32px, 3.6vw, 44px);
  line-height: 1.15;
  letter-spacing: -0.01em;
  color: var(--cp-text-primary);
  text-wrap: balance;
}
.t-h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: clamp(26px, 2.6vw, 32px);
  line-height: 1.2;
  color: var(--cp-text-primary);
  text-wrap: balance;
}
.t-h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 24px;
  line-height: 1.3;
  color: var(--cp-text-primary);
}
.t-lead {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 20px;
  line-height: 1.6;
  color: var(--cp-text-body);
  text-wrap: pretty;
}
.t-body { font-size: 17px; line-height: 1.65; color: var(--cp-text-body); }
.t-small { font-size: 15px; line-height: 1.5; color: var(--cp-text-body); font-weight: 500; }
.t-caption { font-size: 13px; line-height: 1.54; color: var(--cp-text-muted); font-weight: 500; }
.t-eyebrow {
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--cp-terracotta);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
}
@media (max-width: 720px) {
  .container { padding: 0 20px; }
}

.section { padding: 96px 0; }
@media (max-width: 720px) {
  .section { padding: 56px 0; }
}

.section-sand { background: var(--cp-surface-2); }
.section-ink { background: var(--cp-ink); color: var(--cp-text-onink); }
.section-ink .t-hero, .section-ink .t-h1, .section-ink .t-h2, .section-ink .t-h3 { color: var(--cp-cream); }
.section-ink .t-lead, .section-ink .t-body { color: rgba(250, 245, 236, 0.82); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 16px;
  line-height: 1;
  border-radius: var(--radius-pill);
  cursor: pointer;
  text-decoration: none;
  border: 1.5px solid transparent;
  transition: background var(--motion-fast), color var(--motion-fast), border-color var(--motion-fast), transform var(--motion-fast);
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--cp-terracotta); color: var(--cp-cream); }
.btn-primary:hover { background: var(--cp-terracotta-deep); }
.btn-ghost { background: transparent; color: var(--cp-ink); border-color: var(--cp-ink); }
.btn-ghost:hover { background: var(--cp-ink); color: var(--cp-cream); }
.btn-ink { background: var(--cp-ink); color: var(--cp-cream); }
.btn-ink:hover { background: #0c2821; }
.btn-onink-ghost { background: transparent; color: var(--cp-cream); border-color: rgba(250, 245, 236, 0.4); }
.btn-onink-ghost:hover { background: rgba(250, 245, 236, 0.08); border-color: var(--cp-cream); }
.btn-lg { padding: 18px 32px; font-size: 17px; }
.btn-sm { padding: 10px 18px; font-size: 14px; }

.card {
  background: var(--cp-cream);
  border: 1px solid var(--cp-border);
  border-radius: var(--radius-md);
  padding: 28px;
  transition: box-shadow var(--motion-base), transform var(--motion-base);
}

.ph-frame {
  position: relative;
  background:
    repeating-linear-gradient(-45deg, rgba(20,52,43,0.04) 0 2px, transparent 2px 14px),
    var(--cp-sand);
  border: 1px solid var(--cp-border-hard);
  border-radius: var(--radius-md);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  color: var(--cp-text-muted);
  overflow: hidden;
}
.ph-frame .ph-label {
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cp-ink);
  background: var(--cp-cream);
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--cp-border-hard);
  margin-bottom: 12px;
}
.ph-frame .ph-note {
  font-size: 13px;
  color: var(--cp-text-muted);
  max-width: 220px;
  line-height: 1.4;
  text-wrap: balance;
}

.input {
  width: 100%;
  padding: 12px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  line-height: 1.4;
  background: var(--cp-cream);
  border: 1px solid var(--cp-border-hard);
  border-radius: var(--radius-sm);
  color: var(--cp-text-primary);
  transition: border-color var(--motion-fast), box-shadow var(--motion-fast);
}
.input:focus {
  outline: none;
  border-color: var(--cp-terracotta);
  box-shadow: 0 0 0 2px rgba(194, 85, 58, 0.25);
}
.label { display: block; margin-bottom: 6px; font-size: 15px; font-weight: 500; color: var(--cp-text-body); }

.monogram {
  width: 40px;
  height: 40px;
  border: 1.5px solid var(--cp-terracotta);
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  color: var(--cp-ink);
  font-size: 16px;
  letter-spacing: 0.01em;
}
.monogram-ink { color: var(--cp-cream); border-color: var(--cp-terracotta); }

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 999px;
  background: rgba(194, 85, 58, 0.12);
  color: var(--cp-terracotta);
}
.tag-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cp-terracotta);
  display: inline-block;
}

.faq-item { border-bottom: 1px solid var(--cp-border); padding: 20px 0; }
.faq-q {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  width: 100%;
  background: none;
  border: none;
  padding: 0;
  text-align: left;
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 20px;
  color: var(--cp-text-primary);
  line-height: 1.3;
  gap: 16px;
}
.faq-q:hover { color: var(--cp-terracotta); }
.faq-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border: 1px solid var(--cp-border-hard);
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  color: var(--cp-ink);
  transition: transform var(--motion-base), background var(--motion-fast);
  font-size: 18px; line-height: 1;
}
.faq-item.open .faq-icon { background: var(--cp-ink); color: var(--cp-cream); border-color: var(--cp-ink); transform: rotate(45deg); }
.faq-a { max-height: 0; overflow: hidden; transition: max-height var(--motion-base), padding var(--motion-base); }
.faq-item.open .faq-a { padding-top: 16px; max-height: 400px; }
.faq-a-inner {
  border-top: 1.5px solid var(--cp-terracotta);
  padding-top: 14px;
  color: var(--cp-text-body);
  font-size: 17px;
  line-height: 1.65;
  max-width: 60ch;
}

.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 245, 236, 0.92);
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  border-bottom: 1px solid transparent;
  transition: border-color var(--motion-base), box-shadow var(--motion-base);
}
.nav.scrolled { border-bottom-color: var(--cp-border); box-shadow: var(--shadow-1); }
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  font-size: 15px;
  color: var(--cp-text-body);
}
.nav-links a { color: var(--cp-text-body); text-decoration: none; transition: color var(--motion-fast); }
.nav-links a:hover { color: var(--cp-terracotta); }
@media (max-width: 880px) { .nav-links { display: none; } }

.footer {
  background: var(--cp-ink);
  color: rgba(250, 245, 236, 0.72);
  padding: 72px 0 40px;
}
.footer a { color: var(--cp-cream); text-decoration: none; }
.footer a:hover { color: var(--cp-terracotta); }
.footer-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 48px;
}
@media (max-width: 880px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 520px) { .footer-grid { grid-template-columns: 1fr; } }
.footer-heading {
  font-family: 'Inter Tight', 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cp-cream);
  margin-bottom: 16px;
}
.footer ul { list-style: none; display: flex; flex-direction: column; gap: 10px; font-size: 15px; }

.tweaks-panel {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 320px;
  background: var(--cp-cream);
  border: 1px solid var(--cp-border-hard);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-3);
  padding: 20px;
  z-index: 9999;
  font-family: 'Inter', sans-serif;
}
.tweaks-panel.hidden { display: none; }
.tweaks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--cp-border); }
.tweaks-title { font-family: 'Fraunces', Georgia, serif; font-weight: 500; font-size: 18px; color: var(--cp-text-primary); }
.tweaks-close { width: 24px; height: 24px; border: none; background: transparent; color: var(--cp-text-muted); cursor: pointer; font-size: 18px; }
.tweak-group { margin-bottom: 16px; }
.tweak-group:last-child { margin-bottom: 0; }
.tweak-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cp-text-muted); margin-bottom: 8px; }
.tweak-group select { width: 100%; padding: 9px 12px; font-family: 'Inter', sans-serif; font-size: 14px; background: white; border: 1px solid var(--cp-border-hard); border-radius: var(--radius-sm); color: var(--cp-text-primary); cursor: pointer; }
.tweak-toggle { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.tweak-switch { position: relative; width: 40px; height: 22px; background: var(--cp-border-hard); border-radius: 999px; cursor: pointer; transition: background var(--motion-fast); flex-shrink: 0; }
.tweak-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: left var(--motion-fast); box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
.tweak-switch.on { background: var(--cp-terracotta); }
.tweak-switch.on::after { left: 20px; }
.tweak-toggle-label { font-size: 13px; color: var(--cp-text-body); line-height: 1.4; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ========== ICONS ========== */
const Icon = {
  arrow: (props) => (
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...props}>
      <line x1="5" y1="12" x2="19" y2="12" />
      <polyline points="13 6 19 12 13 18" />
    </svg>
  ),
  check: (props) => (
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
      <polyline points="20 6 9 17 4 12" />
    </svg>
  ),
  x: (props) => (
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  ),
  dot: () => <span className="tag-dot" />,
};

/* ========== NAVIGATION ========== */
function Nav({ ctaLabel = 'Register for the webinar' }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="container nav-inner">
        <a href="#top" style={{ display: 'flex', alignItems: 'center', gap: 12, textDecoration: 'none' }}>
          <span className="monogram">CP</span>
          <span style={{ fontFamily: 'Fraunces, Georgia, serif', fontWeight: 500, fontSize: 20, color: 'var(--cp-text-primary)' }}>ClearPaths</span>
          <span className="t-caption" style={{ fontFamily: 'Inter Tight, Inter, sans-serif', letterSpacing: '0.08em', textTransform: 'uppercase', fontSize: 10, color: 'var(--cp-text-muted)', paddingLeft: 10, borderLeft: '1px solid var(--cp-border-hard)' }}>Admissions</span>
        </a>
        <div className="nav-links">
          <a href="#how">How it works</a>
          <a href="#grade-911">For 9–10 grade</a>
          <a href="#grade-1112">For 11–12 grade</a>
          <a href="#team">Our team</a>
        </div>
        <a href="#webinar" className="btn btn-primary btn-sm">{ctaLabel}</a>
      </div>
    </nav>
  );
}

/* ========== HERO ========== */
const HERO_HEADLINES = [
  'A UC admissions plan, from someone who read the applications.',
  'The UC system doesn\u2019t decide on GPA alone. Here\u2019s what it actually looks at.',
  'Built for California families. Focused on the UC system.',
  'Your child is not an average applicant. Their application shouldn\u2019t be either.',
];

function Hero({ headlineIndex = 0, ctaEmphasis = 'both', nextWebinar }) {
  const headline = HERO_HEADLINES[headlineIndex] || HERO_HEADLINES[0];
  const primaryIsWebinar = ctaEmphasis !== 'audit';
  const primaryLabel = primaryIsWebinar ? 'Register for the free webinar' : 'Book a free 30-min audit';
  const secondaryLabel = primaryIsWebinar ? 'Book a free 30-min audit' : 'Register for the free webinar';

  return (
    <section id="top" style={{ padding: '48px 0 96px' }}>
      <div className="container">
        <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1.15fr) minmax(0,1fr)', gap: 72, alignItems: 'center' }} className="hero-grid">
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 28 }}>
              <span className="t-eyebrow">Free webinar</span>
              <span style={{ width: 4, height: 4, borderRadius: '50%', background: 'var(--cp-border-hard)' }} />
              <span className="t-caption" style={{ color: 'var(--cp-text-body)', fontWeight: 500 }}>Next: {nextWebinar?.date || 'Apr 23'} · {nextWebinar?.title || 'UC Comprehensive Review'}</span>
            </div>
            <h1 className="t-hero" style={{ marginBottom: 24 }}>{headline}</h1>
            <p className="t-lead" style={{ maxWidth: '52ch', marginBottom: 36 }}>
              Free 60-minute webinar with a former UC Berkeley admissions reader. For parents of 9th–11th graders in California.
            </p>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 40 }}>
              <a href="#webinar" className="btn btn-primary btn-lg">
                {primaryLabel} <Icon.arrow />
              </a>
              {ctaEmphasis !== 'primary-only' && (
                <a href="#audit" className="btn btn-ghost btn-lg">{secondaryLabel}</a>
              )}
            </div>
            <div className="t-caption" style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ width: 28, height: 1.5, background: 'var(--cp-terracotta)' }} />
              No credit card. No obligation. The webinar is genuinely free.
            </div>
          </div>

          <div style={{ position: 'relative' }}>
            <div style={{ position: 'absolute', left: -24, top: 40, bottom: 40, width: 3, background: 'var(--cp-terracotta)' }} />
            <div style={{ background: 'var(--cp-sand)', borderRadius: 'var(--radius-lg)', padding: 28 }}>
              <div className="ph-frame" style={{ aspectRatio: '4/5', width: '100%', minHeight: 420 }}>
                <div className="ph-label">Portrait · Emily Parliman</div>
                <div className="ph-note">Natural light, 3/4 frontal, warm film edit. Min 240px on desktop. Replace with studio shot.</div>
              </div>
              <div style={{ marginTop: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                <div>
                  <div style={{ fontFamily: 'Fraunces, Georgia, serif', fontWeight: 500, fontSize: 22, color: 'var(--cp-text-primary)' }}>Emily Parliman</div>
                  <div className="t-caption" style={{ marginTop: 2 }}>Senior UC consultant · Former Admissions Officer, UC Berkeley</div>
                </div>
                <div className="tag"><Icon.dot />Leads this webinar</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <style>{`
        @media (max-width: 900px) {
          .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
        }
      `}</style>
    </section>
  );
}

/* ========== TRUST ROW ========== */
function TrustRow() {
  const items = [
    { big: '~4,000', small: 'applications personally reviewed at UC Berkeley' },
    { big: '$1,497', small: 'starting package — full UC engagement' },
    { big: '9–11', small: 'California grade levels we serve' },
    { big: '10+', small: 'years inside selective university admissions' },
  ];
  return (
    <section style={{ borderTop: '1px solid var(--cp-border)', borderBottom: '1px solid var(--cp-border)', background: 'var(--cp-surface-2)' }}>
      <div className="container" style={{ padding: '32px 32px' }}>
        <div className="trust-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)' }}>
          {items.map((it, i) => (
            <div key={i} style={{ padding: '8px 20px', borderRight: i < items.length - 1 ? '1px solid var(--cp-border-hard)' : 'none' }}>
              <div style={{ fontFamily: 'Fraunces, Georgia, serif', fontWeight: 500, fontSize: 32, color: 'var(--cp-ink)', lineHeight: 1.05, marginBottom: 6 }}>{it.big}</div>
              <div className="t-caption" style={{ textWrap: 'balance' }}>{it.small}</div>
            </div>
          ))}
        </div>
      </div>
      <style>{`

        <div className="tweaks-title">Tweaks</div>
        <button className="tweaks-close" onClick={onClose}>×</button>
      </div>
      <div className="tweak-group">
        <label>Hero headline</label>
        <select value={state.headlineIndex} onChange={(e) => setState({ ...state, headlineIndex: +e.target.value })}>
          {HERO_HEADLINES.map((h, i) => (
            <option key={i} value={i}>{i + 1}. {h.length > 42 ? h.slice(0, 42) + '…' : h}</option>
          ))}
        </select>
      </div>
      <div className="tweak-group">
        <label>Primary CTA</label>
        <select value={state.ctaEmphasis} onChange={(e) => setState({ ...state, ctaEmphasis: e.target.value })}>
          <option value="both">Both — webinar + audit</option>
          <option value="webinar">Webinar-first</option>
          <option value="audit">Audit-first</option>
        </select>
      </div>
      <div className="tweak-group">
        <div className="tweak-toggle">
          <div className="tweak-toggle-label">Show pricing section</div>
          <div className={`tweak-switch ${state.showPricing ? 'on' : ''}`} onClick={() => setState({ ...state, showPricing: !state.showPricing })} />
        </div>
      </div>
    </div>
  );
}

/* ========== APP ========== */
const TWEAK_DEFAULTS = {
  headlineIndex: 0,
  ctaEmphasis: 'both',
  showPricing: true,
};

function App() {
  const [state, setState] = React.useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateState = (next) => {
    setState(next);
    const changed = {};
    Object.keys(next).forEach(k => { if (next[k] !== state[k]) changed[k] = next[k]; });
    if (Object.keys(changed).length) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: changed }, '*');
    }
  };

  const ctaLabel = state.ctaEmphasis === 'audit' ? 'Book a free audit' : 'Register for the webinar';

  return (
    <>
      <Nav ctaLabel={ctaLabel} />
      <Hero
        headlineIndex={state.headlineIndex}
        ctaEmphasis={state.ctaEmphasis}
        nextWebinar={{ date: 'Apr 23', title: 'UC Comprehensive Review' }}
      />
      <TrustRow />
      <ProblemFraming />
      <PainTracks />
      <HowItWorks />
      <OurTeam />
      <Stats />
      <SchoolListViz />
      {state.showPricing && <Pricing />}
      <Comparison />
      <Testimonials />
      <FAQ />
      <FinalCTA ctaEmphasis={state.ctaEmphasis} />
      <Footer />
      <TweaksPanel
        visible={tweaksVisible}
        onClose={() => setTweaksVisible(false)}
        state={state}
        setState={updateState}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
