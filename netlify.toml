[build]
  functions = "netlify/functions"

# Block direct access to the dashboard HTML files
# They can only be served through the authenticated /api/dashboard endpoint
[[redirects]]
  from = "/_dashboards/*"
  to = "/404"
  status = 404
  force = true

# Serve the portal login page cleanly
[[redirects]]
  from = "/portal"
  to = "/portal/index.html"
  status = 200
